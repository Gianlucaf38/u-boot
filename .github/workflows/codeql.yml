name: "CodeQL U-Boot Custom"

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Ti permette di avviarlo a mano per testare

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex bc libssl-dev libsdl2-dev build-essential

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          # Qui carichiamo la TUA query personalizzata
          queries: ./query/taint_tracking.ql

      - name: Build U-Boot (Sandbox)
        run: |
          make sandbox_defconfig
          # Usiamo -fcommon per evitare errori su definizioni duplicate (yylloc)
          # Usiamo NO_SDL=1 per evitare errori grafici nel runner
          make HOSTCFLAGS="-fcommon" CFLAGS="-fcommon" NO_SDL=1 -j$(nproc) || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "custom-analysis"
