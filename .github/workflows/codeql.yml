name: "CodeQL Taint Tracking"

on: [push] # Si attiva ad ogni caricamento di codice

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev bison flex bc libssl-dev

      - name: Init CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          queries: ./query/taint_tracking.ql # Qui esegue SOLO la tua query

      - name: Build U-Boot
        run: |
          make sandbox_defconfig
          make HOSTCFLAGS="-fcommon" CFLAGS="-fcommon" NO_SDL=1 -j$(nproc)

      - name: Run Analysis
        uses: github/codeql-action/analyze@v4
