name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '31 7 * * 2'

jobs:
  analyze:
    name: Analyze C-CPP
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installazione dipendenze per compilare U-Boot sandbox
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev build-essential bison flex bc libssl-dev

      # Inizializzazione CodeQL con puntamento alla tua query
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: ./query/taint_tracking.ql

      # Compilazione manuale con fix per definizioni multiple (yylloc)
      - name: Build U-Boot (Manual)
        run: |
          make sandbox_defconfig
          make HOSTCFLAGS="-fcommon" CFLAGS="-fcommon" -j$(nproc) || make HOSTCFLAGS="-fcommon" CFLAGS="-fcommon" NO_SDL=1 -j$(nproc)

      # Analisi finale e upload dei risultati su GitHub Security
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
